<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Librarian — Student Accounts</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../../styles/librarian_students.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <span class="logo">Book Library</span>
    <p class="role">Librarian Panel</p>
    <a href="librarian_books.html">Book Management</a>
    <a href="librarian_students.html" class="active">Student Accounts</a>
    <a href="librarian_operations.html">Library Operations</a>
    <a href="librarian_notifications.html">Notifications</a>
    <div class="logout"><a href="login.html">Log Out</a></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <h1 class="page-title">Student <em>Accounts</em></h1>
    <p class="page-sub">Register and manage student library accounts</p>

    <div class="top-bar">
      <input class="search-input" type="text" placeholder="Search by name or ID..." />
      <button class="btn btn-gold" onclick="document.getElementById('addModal').classList.add('open')">+ Register Student</button>
    </div>

    <!-- Replace the entire <table> block -->
<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Student ID</th>
      <th>Email</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody id="studentTableBody">
    <!-- populated by get_users.js -->
  </tbody>
</table>
  </div>

  <!-- REGISTER STUDENT MODAL -->
  <div class="modal-bg" id="addModal">
    <div class="modal">
      <h3>Register <em>Student</em></h3>
      <div class="form-group"><label>Full Name</label><input type="text" placeholder="e.g. John Doe" /></div>
      <div class="form-group"><label>Student ID</label><input type="text" placeholder="e.g. STU-004" /></div>
      <div class="form-group"><label>Email</label><input type="email" placeholder="student@uni.edu" /></div>
      <div class="form-group"><label>Password</label><input type="password" placeholder="••••••••" /></div>
      <div class="modal-btns">
        <button class="btn btn-gold">Register</button>
        <button class="btn btn-dark" onclick="document.getElementById('addModal').classList.remove('open')">Cancel</button>
      </div>
    </div>
  </div>
<script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
    crossorigin="anonymous"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/get_students.js"></script>
  <script>
    // Only admins can access
    initAuth([2]);
  </script>
</body>
</html>
