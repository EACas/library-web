<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Librarian — Book Management</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Cormorant+Garamond:wght@300;400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../../styles/librarian_books.css" />
</head>

<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <span class="logo">Book Library</span>
    <p class="role">Librarian Panel</p>
    <a href="librarian_books.html" class="active">Book Management</a>
    <a href="librarian_students.html">Student Accounts</a>
    <a href="librarian_operations.html">Library Operations</a>
    <a href="librarian_notifications.html">Notifications</a>
    <div class="logout"><a href="login.html">Log Out</a></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <h1 class="page-title">Book <em>Management</em></h1>
    <p class="page-sub">Add, edit, categorize and update book status</p>

    <div class="top-bar">
      <input class="search-input" type="text" placeholder="Search by title, author..." />
      <select class="filter">
        <option>All Genres</option>
        <option>Philosophy</option>
        <option>Literature</option>
        <option>History</option>
        <option>Science</option>
        <option>Art</option>
      </select>
      <select class="filter">
        <option>Sort: A–Z</option>
        <option>Sort: Author</option>
        <option>Sort: Year</option>
        <option>Sort: Status</option>
      </select>
      <button class="btn btn-gold" onclick="document.getElementById('addModal').classList.add('open')">+ Add
        Book</button>
    </div>

    <div class="section">
      <h2>Books</h2>
      <div id="bookTableContainer"></div>
    </div>

  </div>

  <!-- ADD BOOK MODAL -->
  <div class="modal-bg" id="addModal">
    <div class="modal">
      <h3>Add New <em>Book</em></h3>

      <form id="registerBookForm">
        <div class="form-group">
          <label>Title</label>
          <input type="text" name="book_title" placeholder="Book title" required />
        </div>

        <div class="form-group">
          <label>Author</label>
          <select id="authorSelect" name="author_id" required>
            <option value="">Select Author</option>
          </select>
        </div>

        <div class="form-group">
          <label>Genre</label>
          <div id="genreCheckboxContainer" class="checkbox-group"></div>
        </div>

        <div class="form-group">
          <label>Publish Date</label>
          <input type="date" name="publish_date" />
        </div>

        <div class="form-group">
          <label>Price</label>
          <input type="number" name="price" placeholder="e.g. 19.99" step="0.01" min="0" />
        </div>

        <div class="form-group">
          <label>Stock</label>
          <input type="number" name="stock" placeholder="e.g. 5" min="0" />
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea name="description" placeholder="Brief description..."></textarea>
        </div>

        <div id="bookMessage"></div>

        <div class="modal-btns">
          <button type="submit" class="btn btn-gold">Save Book</button>
          <button type="button" class="btn btn-dark"
            onclick="document.getElementById('addModal').classList.remove('open')">Cancel</button>
        </div>
      </form>

    </div>
  </div>

  <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
    crossorigin="anonymous"></script>
  <script src="../../js/auth.js"></script>
  <script>
    initAuth([2]); // Only admins
  </script>
  <script src="../../js/register_book.js"></script>
  <script src="../../js/register_author.js"></script>
  <script src="../../js/get_book_data.js"></script>
  <script src="../../js/get_authors_and_genres.js"></script>
</body>

</html>
