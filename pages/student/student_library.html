<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student — My Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../../styles/student_library.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <span class="logo">Book Library</span>
    <p class="role">Student Portal</p>
    <a href="student_library.html" class="active">Browse Books</a>
    <a href="student_account.html">My Account</a>
    <div class="logout"><a href="../../login.html">Log Out</a></div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <h1 class="page-title">Browse <em>Books</em></h1>
    <p class="page-sub">Search, reserve and borrow from our collection</p>

    <!-- SEARCH BOOKS -->
    <div class="section">
      <h2>Search <em>Catalogue</em></h2>
      <div class="search-bar">
        <input class="search-input" id="bookSearch" type="text" placeholder="Search by title or author..." />
        <select class="filter" id="genreFilter">
          <option value="">All Genres</option>
        </select>
      </div>
      <div id="bookGrid" class="book-grid">
        <p>Loading books...</p>
      </div>
    </div>

  </div>

  <!-- BOOK DETAIL MODAL -->
  <div class="modal-bg" id="bookModal">
    <div class="modal">
      <h3 id="modalBookTitle"></h3>

      <div class="form-group">
        <label>Author(s)</label>
        <p id="modalBookAuthors"></p>
      </div>
      <div class="form-group">
        <label>Genre(s)</label>
        <p id="modalBookGenres"></p>
      </div>
      <div class="form-group">
        <label>Description</label>
        <p id="modalBookDesc"></p>
      </div>
      <div class="form-group">
        <label>Publish Date</label>
        <p id="modalBookDate"></p>
      </div>
      <div class="form-group">
        <label>Price</label>
        <p id="modalBookPrice"></p>
      </div>
      <div class="form-group">
        <label>Availability</label>
        <p id="modalBookStock"></p>
      </div>

      <div id="modalActionMessage"></div>

      <div class="modal-btns">
        <button id="modalBorrowBtn"  class="btn btn-gold">Borrow</button>
        <button id="modalReserveBtn" class="btn btn-dark">Reserve</button>
        <button type="button" class="btn btn-dark" onclick="closeBookModal()">Close</button>
      </div>
    </div>
  </div>

  <div id="actionMessage" class="action-message" style="display:none;"></div>

  <script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
  <script src="../../js/auth.js"></script>
  <script src="../../js/student_library.js"></script>
  <script>
    initAuth([3]).then(() => loadLibrary());
  </script>
</body>
</html>
