<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Library — Register</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* LEFT SIDE — FORM */
    .left {
      background: #f5efe6;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px 70px;
      position: relative;
    }
    .left .back {
      position: absolute;
      top: 28px; left: 36px;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #9c8e7a;
      text-decoration: none;
    }
    .left .back:hover { color: #0d0b08; }

    .form-box { width: 100%; max-width: 360px; }

    .form-box p.label {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #b8922a;
      margin-bottom: 10px;
    }
    .form-box h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      color: #0d0b08;
      margin-bottom: 6px;
    }
    .form-box h1 em { color: #7a1f1f; }
    .form-box .subtitle {
      color: #9c8e7a;
      font-size: 0.95rem;
      margin-bottom: 36px;
    }

    /* INPUTS */
    .form-box label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #0d0b08;
      margin-bottom: 6px;
    }
    .form-box input,
    .form-box select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(13,11,8,0.2);
      border-bottom: 2px solid rgba(13,11,8,0.3);
      background: transparent;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      color: #0d0b08;
      outline: none;
      margin-bottom: 20px;
    }
    .form-box input:focus,
    .form-box select:focus { border-color: #b8922a; }
    .form-box input::placeholder { color: #9c8e7a; }

    /* BUTTONS */
    .btn-main {
      width: 100%;
      padding: 14px;
      background: #0d0b08;
      color: #f5efe6;
      border: none;
      cursor: pointer;
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .signin {
      text-align: center;
      margin-top: 24px;
      font-size: 0.9rem;
      color: #9c8e7a;
    }
    .signin a { color: #7a1f1f; font-style: italic; text-decoration: none; }

    /* RIGHT SIDE — IMAGE PANEL */
    .right {
      background: url('../img/login-bg.png') center/cover no-repeat;
      position: relative;
    }
    .right::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(13,11,8,0.65);
    }
    .right-content {
      position: absolute;
      bottom: 60px; left: 50px; right: 50px;
    }
    .quote-card {
      background: rgba(13,11,8,0.7);
      border: 1px solid rgba(184,146,42,0.25);
      padding: 32px 36px;
    }
    .quote-card .stars { color: #b8922a; letter-spacing: 4px; margin-bottom: 14px; }
    .quote-card blockquote {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: #f5efe6;
      line-height: 1.7;
      border-left: 2px solid #b8922a;
      padding-left: 16px;
      margin-bottom: 20px;
    }
    .quote-card .name {
      font-family: 'Playfair Display', serif;
      color: #f5efe6;
      font-size: 0.95rem;
    }
    .quote-card .role { color: #9c8e7a; font-size: 0.8rem; }

    /* MOBILE */
    @media (max-width: 768px) {
      body { grid-template-columns: 1fr; }
      .right { display: none; }
      .left { padding: 50px 28px; }
    }
  </style>
</head>
<body>

  <!-- LEFT: FORM -->
  <div class="left">
    <a href="index.html" class="back">← Back to library</a>

    <div class="form-box">
      <p class="label">New Member</p>
      <h1>Create <em>Account</em></h1>
      <p class="subtitle">Register to access the library.</p>

      <!-- Role — moved here from login -->
      <label for="role">I am a</label>
      <select id="role">
        <option value="">Select your role...</option>
        <option value="student">Student</option>
        <option value="librarian">Librarian</option>
        <option value="admin">Admin</option>
      </select>

      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="e.g. John Doe" />

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="your@email.com" />

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" />

      <label for="confirm">Confirm Password</label>
      <input type="password" id="confirm" placeholder="••••••••" />

      <button class="btn-main" onclick="handleRegister()">Create Account</button>

      <p class="signin">Already have an account? <a href="login.html">Sign in here</a></p>
    </div>
  </div>

  <!-- RIGHT: IMAGE PANEL -->
  <div class="right">
    <div class="right-content">
      <div class="quote-card">
        <div class="stars">★★★★★</div>
        <blockquote>"Joining Book Library opened up a whole world of knowledge I never expected to find."</blockquote>
        <p class="name">James L.</p>
        <p class="role">Student, University of Belize</p>
      </div>
    </div>
  </div>

  <script>
    function handleRegister() {
      var role     = document.getElementById('role').value;
      var name     = document.getElementById('name').value;
      var email    = document.getElementById('email').value;
      var password = document.getElementById('password').value;
      var confirm  = document.getElementById('confirm').value;

      /* Check all fields are filled */
      if (!role || !name || !email || !password || !confirm) {
        alert('Please fill in all fields.');
        return;
      }

      /* Check passwords match */
      if (password !== confirm) {
        alert('Passwords do not match.');
        return;
      }

      /* Redirect to the correct dashboard based on role */
      if (role === 'admin')      window.location.href = 'admin_dashboard.html';
      if (role === 'librarian')  window.location.href = 'librarian_books.html';
      if (role === 'student')    window.location.href = 'student_library.html';
    }
  </script>

</body>
</html>
